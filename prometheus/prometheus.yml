global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  # Common rules (always load)
  - "alert_rules_common.yml"
  # Choose ONE of the following based on your plant type:
  - "alert_rules_eurodocsis.yml"
  # - "alert_rules_docsis_us.yml"
  # If using OTLP metrics via an OTel Collector → Prometheus backend,
  # use the OTLP rules instead of the above three files:
  # - "alert_rules_otlp.yml"

scrape_configs:
  - job_name: "cm3500"
    static_configs:
      - targets: ["localhost:10044"]
    scrape_interval: 30s
